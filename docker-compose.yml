version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ev-drive-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ev-test-drive
    volumes:
      - mongodb_data:/data/db
    networks:
      - ev-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ev-drive-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ev-test-drive
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    networks:
      - ev-network
    command: npm start

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ev-drive-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    networks:
      - ev-network
    command: npm start

volumes:
  mongodb_data:
    driver: local

networks:
  ev-network:
    driver: bridge

